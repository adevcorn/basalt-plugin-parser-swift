name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install LLVM + WASI sysroot
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang lld llvm
          # Install wasi-libc sysroot
          wget -q https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-24/wasi-sdk-24.0-x86_64-linux.tar.gz
          tar -xzf wasi-sdk-24.0-x86_64-linux.tar.gz
          echo "WASI_SDK=$PWD/wasi-sdk-24.0-x86_64-linux" >> $GITHUB_ENV

      - name: Build
        env:
          CC_wasm32_wasip1: clang
          AR_wasm32_wasip1: llvm-ar
          CFLAGS_wasm32_wasip1: "--sysroot=${{ env.WASI_SDK }}/share/wasi-sysroot -include ${{ github.workspace }}/wasi_dup_stub.h"
        run: cargo build --release --target wasm32-wasip1

      - name: Rename artifact
        run: |
          WASM=$(ls target/wasm32-wasip1/release/*.wasm | head -1)
          cp "$WASM" parser.wasm

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: parser.wasm
